<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Google Drive Video</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe 
    src="https://drive.google.com/file/d/1282kTMuyc7W4UpeXic2bKSwQY-6zI0rD/preview" 
    allow="autoplay; fullscreen; encrypted-media">
  </iframe>
</body>
</html>
