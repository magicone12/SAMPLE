<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:black;
overflow:hidden;
}

/* VIDEO */
video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
z-index:1;
pointer-events:none;
}

/* TITLE */
#title{
position:absolute;
top:25px;
left:40px;
color:white;
font-family:Arial;
font-size:18px;
background:rgba(0,0,0,0.5);
padding:6px 12px;
border-radius:6px;
z-index:9999;
}

/* LOGOS */
#logo1{
position:absolute;
top:2%;
left:2%;
width:120px;
z-index:9999;
}

#logo2{
position:absolute;
top:2%;
right:2%;
width:120px;
z-index:9999;
}

#logo3{
position:absolute;
bottom:2%;
left:50%;
transform:translateX(-50%);
width:120px;
z-index:9999;
}

/* TEXT */
#text1{
position:absolute;
top:10%;
left:2%;
color:white;
z-index:9999;
font-size:20px;
}

#text2{
position:absolute;
top:10%;
right:2%;
color:white;
z-index:9999;
font-size:20px;
}

#text3{
position:absolute;
bottom:8%;
left:50%;
transform:translateX(-50%);
color:white;
z-index:9999;
font-size:22px;
}

/* SELECTED */
.selected{
outline:2px solid yellow;
}

</style>

</head>

<body oncontextmenu="return false">

<div id="title"></div>

<!-- VIDEO -->
<video id="player" autoplay playsinline controls></video>

<!-- LOGOS -->
<img src="https://via.placeholder.com/120x60?text=Logo1" id="logo1">
<img src="https://via.placeholder.com/120x60?text=Logo2" id="logo2">
<img src="https://via.placeholder.com/120x60?text=Logo3" id="logo3">

<!-- TEXT -->
<div id="text1">TEXT 1</div>
<div id="text2">TEXT 2</div>
<div id="text3">TEXT 3</div>

<script>

/* PLAYLIST */
const playlist=[
const playlist = [
{
title:"Movie 1",
src:"https://videos.gia.tv/giatv/movies/playlist/211473/zoren_movie1_2.mp4",

logo1:"https://via.placeholder.com/120x60?text=CH1",
logo2:"https://via.placeholder.com/120x60?text=HD",
logo3:"https://via.placeholder.com/120x60?text=LIVE",

text1:"CHANNEL 1",
text2:"NOW SHOWING",
text3:"TAGALOG MOVIE"
},

{
title:"Movie 2",
src:"https://videos.gia.tv/giatv/movies/playlist/211473/You___re_My_Boss.mp4",

logo1:"https://via.placeholder.com/120x60?text=CH2",
logo2:"https://via.placeholder.com/120x60?text=1080p",
logo3:"https://via.placeholder.com/120x60?text=MOVIE",

text1:"CHANNEL 2",
text2:"ROMCOM",
text3:"ENJOY!"
}
]
]

const video=document.getElementById("player")
const titleBox=document.getElementById("title")

let index=0

function play(i){
index=i
video.src=playlist[i].src

titleBox.innerText=playlist[i].title || ""

video.onended=()=>nextMovie()
}

function nextMovie(){
let next=(index+1)%playlist.length
play(next)
}

play(index)

/* ========================= */
/* SELECT + RESIZE SYSTEM 🔥 */
/* ========================= */

let selected = null;

const items = document.querySelectorAll("#logo1,#logo2,#logo3,#text1,#text2,#text3");

items.forEach(el => {

/* LOAD SAVED SIZE */
const saved = localStorage.getItem("size_"+el.id);
if(saved){
const data = JSON.parse(saved);

if(el.tagName==="IMG"){
el.style.width = data.size + "px";
}else{
el.style.fontSize = data.size + "px";
}
}

/* CLICK SELECT */
el.addEventListener("click", () => {

selected = el;

document.querySelectorAll(".selected").forEach(e=>e.classList.remove("selected"));
el.classList.add("selected");

});

});

/* KEY CONTROLS */
document.addEventListener("keydown",(e)=>{

if(!selected) return;

/* PALAKI */
if(e.key==="+" || e.key==="="){

if(selected.tagName==="IMG"){

let w = selected.offsetWidth + 10;
selected.style.width = w+"px";

localStorage.setItem("size_"+selected.id, JSON.stringify({size:w}));

}else{

let s = parseInt(window.getComputedStyle(selected).fontSize) + 2;
selected.style.fontSize = s+"px";

localStorage.setItem("size_"+selected.id, JSON.stringify({size:s}));

}

}

/* PALIIT */
if(e.key==="-" ){

if(selected.tagName==="IMG"){

let w = selected.offsetWidth - 10;
selected.style.width = w+"px";

localStorage.setItem("size_"+selected.id, JSON.stringify({size:w}));

}else{

let s = parseInt(window.getComputedStyle(selected).fontSize) - 2;
selected.style.fontSize = s+"px";

localStorage.setItem("size_"+selected.id, JSON.stringify({size:s}));

}

}

})

</script>

</body>
</html>
