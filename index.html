<html>

<body oncontextmenu="return false">

<div id="title"></div>

<video id="player"

<script>

const playlist=[

{"title":"A Secret Affair","src":"https://videos.gia.tv/giatv/movies/playlist/211473/A_secret__affair__2019_full_movie_lovestory.mp4"},
{"title":"Di Pwedeng Hindi Pwede","src":"https://ia801703.us.archive.org/27/items/di-puwedeng-hindi-puwede-full-movie-robin-padilla-vina-morales-abs-cbn-star-cinema-720p-h-264/%E2%80%98%27Di%20Puwedeng%20Hindi%20Puwede%21%27%20FULL%20MOVIE%20%20Robin%20Padilla%2C%20Vina%20Morales%20-%20ABS-CBN%20Star%20Cinema%20%28720p%2C%20h264%29.mp4"},{"src":"https://videos.gia.tv/giatv/movies/playlist/211473/rated_og_eng__no_watermarks.mp4"},{"title":"Akin Ang Labang Ito","src":"https://videos.gia.tv/giatv/movies/playlist/211473/AKIN_ANG_LABANG_ITO___Full_Movie___Action_w__Ace_Espinos.mp4"},{"title":"Jack Em Popoy","src":"https://dn721904.ca.archive.org/0/items/jack-em-popoy-the-puliscredibles-vic-sotto-coco-martin-comedy-tagalog-pinoy-full-movie-480p/JACK%20EM%20POPOY%20THE%20PULISCREDIBLES%20VIC%20SOTTO%20COCO%20MARTIN%20COMEDY%20TAGALOG%20PINOY%20FULL%20MOVIE%20%28480p%29.mp4"},
{"title":"Paano Kita Iibigin","src":"https://dn710202.ca.archive.org/0/items/piolopascual/2007-Paano%20Kita%20Iibigin-%20Piolo%20Regine.mp4"},
{"title":"Peter Pan & Wendy","src":"https://www.dropbox.com/s/mg94zxkcfjoedvq/D21.FUN-Peter-Pan-Wendy-2023-1682681957.mp4?dl=1"},
{"title":"Love Me Again","src":"https://dn710202.ca.archive.org/0/items/piolopascual/2009-Love%20me%20again%20piolo%20angel.mp4"},
{"title":"Bondying","src":"https://videos.gia.tv/giatv/movies/playlist/211473/YTDown_com_YouTube_Bondying_The_Little_Big_Boy_FULL_MOVIE_H_Media_TLu4UhY9aow_002_720p.mp4"},
{"title":"Plane","src":"https://www.dropbox.com/s/bmvat7xcbxxvx4j/D21.FUN-Plane-2023-1675423071.mp4?dl=1"},
{"title":"Every Breath U Take","src":"https://dn710202.ca.archive.org/0/items/piolopascual/2012-Every%20Breath%20U%20Take%20Piolo%20Angelica.mp4"},
{"src":"https://videos.gia.tv/giatv/movies/playlist/211473/nescafe_jaycee_domincel.mp4"},
{"src":"https://videos.gia.tv/giatv/movies/playlist/211473/qenerhiya__2___1_.mp4"},
{"title":"Bad Boy","src":"https://videos.gia.tv/giatv/movies/playlist/211473/Bad_Boy_FULL_MOVIE_HD___Robin_Padilla.mp4"},
{"title":"Love Me Tomorrow","src":"https://dn710202.ca.archive.org/0/items/piolopascual/2016-love%20me%20tomorrow-%20dawn%20piolo.mp4"},
{"title":"Rob B Hood","src":"https://dn710206.ca.archive.org/0/items/youtube-cYulLxSBx8k/Rob.B.Hood.2006.480p.BDRip.XviD.DUAL-KiNGS.mp4"}]

const video=document.getElementById("player")
const titleBox=document.getElementById("title")

let index=parseInt(localStorage.getItem("movie_index"))||0
let time=parseFloat(localStorage.getItem("movie_time"))||0

let loadTimeout

function play(i,start=0){

index=i

clearTimeout(loadTimeout)

video.src=playlist[i].src

if(playlist[i].title){

titleBox.innerText=playlist[i].title
titleBox.style.display="block"

}else{

titleBox.style.display="none"

}

video.onloadedmetadata=()=>{

clearTimeout(loadTimeout)

video.currentTime=start

video.play().catch(()=>{})

}

video.onended=()=>{

nextMovie()

}

/* AUTO SKIP IF ERROR */

video.onerror=()=>{

nextMovie()

}

/* AUTO SKIP IF STUCK LOADING */

loadTimeout=setTimeout(()=>{

if(video.readyState<2){

nextMovie()

}

},8000)

}

function nextMovie(){

let next=(index+1)%playlist.length

play(next,0)

}

/* SAVE POSITION */

setInterval(()=>{

localStorage.setItem("movie_index",index)
localStorage.setItem("movie_time",video.currentTime)

},500)

/* DOUBLE CLICK FULLSCREEN */

video.addEventListener("dblclick",()=>{

if(!document.fullscreenElement){

video.requestFullscreen()

}else{

document.exitFullscreen()

}

})

/* BLOCK RIGHT CLICK */

document.addEventListener("contextmenu",e=>e.preventDefault())

play(index,time)

</script>

</body>
</html>
